name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Compile Python sources
        run: python -m compileall -q cerberus sdk simulator tests
      - name: Validate JSON artifacts
        run: |
          python -m json.tool policies/policies.json >/dev/null
          python -m json.tool schemas/action-envelope.schema.json >/dev/null
          python -m json.tool schemas/decision-token.schema.json >/dev/null
          python -m json.tool schemas/policy-bundle.schema.json >/dev/null
      - name: Run unit, schema, and adversarial corpus tests
        run: python -m pytest -q
